    roles: ["test_generation", "fix", "migration"]
    priority: 6
    description: "GLM-5.2 — Alta densidade de token. Perfeito para converter bases inteiras de código e aplicar patches."
    max_tokens: 131072
    context_window: 999424
    prompt_cost_per_1m_tokens: 0
    completion_cost_per_1m_tokens: 0
    cached_prompt_cost_per_1m_tokens: 0

  - name: "ollama/north-mini-code-1.0:cloud"
    provider: "ollama"
    api_base: "http://localhost:11434"
    roles: ["fix", "refactoring"]
    priority: 7
    description: "Cohere North Mini Code (30B) — Especialista ultrarrápido em automações agênticas locais e patches diretos."
