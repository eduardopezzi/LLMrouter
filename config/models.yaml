# Configuração de Modelos LLM — Ollama primário + provedores de fallback
#
# Pipeline multi-modelo com fallback hierárquico:
#   1. Ollama — modelos preferenciais por tarefa
#   2. NVIDIA NIM — alternativa quando NVIDIA_API_KEY ou NVIDIA_NIM_API_KEY existe
#   3. Z AI (GLM) — fallback quando ZAI_API_KEY existe
#   4. Demais candidatos cadastrados — usados por ordem de prioridade
#
# Roteamento por role:
#   architecture     → Desenho de sistemas, diagramas, esquemas de BD e infraestrutura (IaC)
#   review           → Code Review (segurança, breaking changes, qualidade, impacto)
#   refactoring      → Clean Code, otimização de performance e eliminação de código legado
#   security_audit   → Análise de vulnerabilidades, sanitização e conformidade com OWASP
#   test_generation  → Geração de testes unitários/integração/e2e e mocks
#   fix              → Auto-fix (gera patches sugeridos com aprovação humana)
#   migration        → Conversão de linguagens (ex: JS para TS) e atualização de bibliotecas
#   documentation    → Geração de READMEs, docstrings e contratos de API (Swagger)
#   summarization    → Resumos rápidos de commits, PRs, código e arquivos diff

models:
  # ==================================================================
  # Ollama — Provedor primário (sempre disponível)
  # ==================================================================
  - name: "ollama/kimi-k2.7-code:cloud"
    provider: "ollama"
    api_base: "http://localhost:11434"
    roles: ["review", "fix", "migration"]
    priority: 2
    description: "Kimi-K2.7-Code — Tech Lead sênior focado em correções profundas e migrações complexas de ecossistema."
    max_tokens: 128000
    prompt_cost_per_1m_tokens: 0
